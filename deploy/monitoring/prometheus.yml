# =============================================================================
# Prometheus Configuration — JValleyVerse
# =============================================================================
# Pasang di /etc/prometheus/prometheus.yml pada VPS
# Atau jalankan dengan: prometheus --config.file=prometheus.yml
# =============================================================================

global:
  scrape_interval:     15s      # Default scrape every 15 seconds
  evaluation_interval: 15s      # Evaluate rules every 15 seconds

  external_labels:
    monitor: 'jvalleyverse'
    env:     'production'

# ── Alerting (opsional — bisa ditambahkan nanti) ──────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Alertmanager: localhost:9093

# ── Rule files (opsional) ─────────────────────────────────────────────────
rule_files:
  # - "alerts.yml"

# ── Scrape targets ────────────────────────────────────────────────────────
scrape_configs:

  # ── 1. Go API App (JValleyVerse) ──────────────────────────────────────
  - job_name: 'jvalleyverse-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'localhost:3001'     # Ganti port jika berbeda
        labels:
          service: 'api'
          app:     'jvalleyverse'

  # ── 2. Node Exporter (System Metrics) ──────────────────────────────────
  - job_name: 'node'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'localhost:9100'     # Port default node_exporter
        labels:
          service: 'system'
          host:    'vps-node'
